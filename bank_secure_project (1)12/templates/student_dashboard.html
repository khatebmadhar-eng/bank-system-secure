<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة الطالب الأكاديمية</title>
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.85)), url('{{ student.bg_image }}') no-repeat center center fixed;
            background-size: cover;
            margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif; color: #ffffff;
        }
        .portal-container {
            max-width: 800px; margin: 50px auto; background: rgba(22, 27, 34, 0.95);
            padding: 35px; border-radius: 12px; border: 1px solid #30363d;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.5); text-align: center;
        }
        h1 { color: #56d364; font-size: 2rem; margin-bottom: 25px; }
        .info-box { background: rgba(88, 166, 255, 0.08); border: 1px solid #30363d; padding: 20px; border-radius: 8px; text-align: right; margin-bottom: 20px; }
        .course-table { width: 100%; border-collapse: collapse; margin-top: 15px; text-align: right; }
        .course-table th, .course-table td { padding: 12px; border-bottom: 1px solid #30363d; }
        .course-table th { background-color: #30363d; color: #f0f6fc; }
    </style>
</head>
<body>
    <div class="portal-container">
        <h1>🎓 الملف الأكاديمي الموحد للطلاب</h1>
        <div class="info-box">
            <p><strong>مرحبًا بالطالب:</strong> {{ student.name }}</p>
            <p><strong>التخصص الحالي:</strong> {{ student.major_name }}</p>
            <table class="course-table">
                <thead>
                    <tr>
                        <th>رمز المادة</th>
                        <th>اسم المادة الدراسية المسجلة</th>
                        <th>الساعات</th>
                    </tr>
                </thead>
                <tbody>
                    {% for course in student.courses %}
                    <tr>
                        <td><code>{{ course.code }}</code></td>
                        <td><strong>{{ course.name }}</strong></td>
                        <td>{{ course.hours }} ساعات</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
