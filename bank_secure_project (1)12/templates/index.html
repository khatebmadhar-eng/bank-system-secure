<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الجامعة الأمريكية المشتركة</title>
    <style>
        body {
            /* وضع خلفية معمارية لجامعة أمريكية عريقة مع تظليل داكن */
            background: linear-gradient(rgba(13, 17, 23, 0.75), rgba(13, 17, 23, 0.85)), 
                        url('https://images.unsplash.com/photo-1541339907198-e08756dedf3f?q=80&w=1200') no-repeat center center fixed;
            background-size: cover;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: rgba(22, 27, 34, 0.95);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #30363d;
            box-shadow: 0px 0px 25px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(5px);
        }
        .login-container img {
            width: 75px;
            margin-bottom: 15px;
        }
        h2 { color: #f0f6fc; margin-bottom: 5px; font-size: 1.5rem; }
        p.subtitle { color: #8b949e; font-size: 0.85rem; margin-bottom: 25px; }
        .form-group { margin-bottom: 18px; text-align: right; }
        label { display: block; margin-bottom: 6px; color: #8b949e; font-size: 0.85rem; }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 12px; background-color: #0d1117;
            border: 1px solid #30363d; border-radius: 6px; color: #f0f6fc;
            box-sizing: border-box; font-size: 0.95rem; text-align: right;
        }
        input[type="text"]:focus, input[type="password"]:focus { border-color: #2ea44f; outline: none; }
        button {
            width: 100%; padding: 12px; background-color: #238636; border: none;
            border-radius: 6px; color: #ffffff; font-size: 1rem; font-weight: bold;
            cursor: pointer; transition: 0.2s; margin-top: 10px;
        }
        button:hover { background-color: #2ea44f; }
        .footer-text { margin-top: 25px; font-size: 0.8rem; color: #8b949e; border-top: 1px solid #30363d; padding-top: 12px; }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="https://cdn-icons-png.flaticon.com/512/2231/2231649.png" alt="University Logo">
        <h2>بوابة التحقق الأكاديمي الموحدة</h2>
        <p class="subtitle">نظام تصفية وفحص الهوية الرقمية للطلاب</p>
        <form method="POST" action="/login">
            <div class="form-group">
                <label>اسم المستخدم (الحساب الجامعي):</label>
                <input type="text" name="username" placeholder="أدخل اسم المستخدم للجامعة">
            </div>
            <div class="form-group">
                <label>كلمة المرور:</label>
                <input type="password" name="password" placeholder="••••••••">
            </div>
            <button type="submit">تسجيل الدخول الآمن</button>
        </form>
        <div class="footer-text">
            بوابة الأنظمة الأمنية المشتركة © 2026<br>
            <strong>تصميم وإعداد المهندس مظهر</strong>
        </div>
    </div>
</body>
</html>
