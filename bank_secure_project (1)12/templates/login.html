<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - النظام المصرفي الآمن</title>
    <style>
        body { 
            background-color: #0d1117; 
            color: #c9d1d9; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-box { 
            background-color: #161b22; 
            padding: 40px; 
            border-radius: 12px; 
            border: 1px solid #30363d; 
            width: 340px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); 
        }
        h2 { 
            text-align: center; 
            color: #58a6ff; 
            margin-bottom: 5px;
            font-size: 22px;
        }
        p.subtitle {
            text-align: center;
            color: #8b949e;
            font-size: 13px;
            margin-top: 0;
            margin-bottom: 25px;
        }
        label {
            font-size: 14px;
            color: #8b949e;
            display: block;
            margin-bottom: 5px;
        }
        input[type="text"], input[type="password"] { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 20px; 
            border-radius: 6px; 
            border: 1px solid #30363d; 
            background-color: #0d1117; 
            color: white; 
            box-sizing: border-box; 
            font-size: 14px;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #58a6ff;
            outline: none;
        }
        input[type="submit"] { 
            width: 100%; 
            padding: 12px; 
            background-color: #238636; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 15px;
        }
        input[type="submit"]:hover { 
            background-color: #2ea44f; 
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>بوابة المعاملات المصرفية</h2>
        <p class="subtitle">اتصال مشفر وآمن بالكامل 🔐</p>
        
        <form method="POST">
            <label>رقم الحساب / اسم المستخدم:</label>
            <input type="text" name="username" required placeholder="أدخل المعرّف الرقمي...">
            
            <label>كلمة المرور الآمنة:</label>
            <input type="password" name="password" required placeholder="••••••••">
            
            <input type="submit" value="تسجيل الدخول الآمن">
        </form>
    </div>

</body>
</html>
